name: cc-cchou-v1
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between

      proposal and specs phases. Research existing specs before filling this in.

      Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -

      implementation details belong in design.md.


      This is the foundation - specs, design, and tasks all build on this.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time.

      If adding new concerns without changing existing behavior, use ADDED
      instead.


      Example:

      ```

      ## ADDED Requirements


      ### Requirement: User can export data

      The system SHALL allow users to export their data in CSV format.


      #### Scenario: Successful export

      - **WHEN** user clicks "Export" button

      - **THEN** system downloads a CSV file with all user data


      ## REMOVED Requirements


      ### Requirement: Legacy export

      **Reason**: Replaced by new export system

      **Migration**: Use new export endpoint at /api/v2/export

      ```


      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with clear, comprehensive details
    template: design.md
    instruction: >
      
      # Writing Rules
      - **Text**: Prefer structured text over long prose.
      - **Algorithms**: When presenting logic or algorithms, use short, concise pseudo-Python in code blocks.
      - **Data Models**: When presenting schemas or data models, use markdown tables with explicit field definitions.
      - **Diagrams**:
        - In conversation, prefer ASCII diagrams over Mermaid.
        - In design documents, prefer Mermaid diagrams over ASCII.
      
      ---
      
      # Interaction Guidelines:
      
      - **One question at a time** - Never ask multiple questions in a single message.
      - **Ask for clarification - Never make assumptions when ambiguity exists.
      - **Prefer multiple-choice questions** when practical.
      - **Validate incrementally** - Present one section at a time and get approval before proceeding.
      - **Be flexible** — If new ambiguity appears, pause and clarify before continuing. **Revisit and revise earlier sections when needed**.
      
      ---
      
      # Core Design Principles:
      
      - Think deeply and critically to discover edge cases and hidden complexities.
      - Break systems into small units with:
        * one clear purpose,
        * well-defined interfaces,
        * independent testability.
      - Prioritize:
        * Simplicity
        * Testability
        * Explicitness
      - Apply:
        * **YAGNI**
        * **DRY**.
        * **SOLID**
          - Single Responsibility Principle — each module should have one clear reason to change.
          - Open/Closed Principle — prefer extension points over modifying stable core behavior.
          - Liskov Substitution Principle — abstractions should be safely replaceable by implementations.
          - Interface Segregation Principle — prefer small, focused interfaces over broad ones.
          - Dependency Inversion — depend on abstractions at boundaries, not concrete implementations.
      - DO NOT propose unrelated refactoring.
      - Follow existing patterns unless there is a good reason not to.
      - If existing code has issues that materially affect the requested work (e.g. oversized files, unclear boundaries, tangled responsibilities), include targeted improvements in the design.
      
      ---
      
      # Required Process Checklist
      
      You MUST create a task for each item below and complete them in order:
      
      1. **Explore project context**
         - Review files, docs, recent commits, and provided context.
      2. **Ask clarifying questions**
         - Ask exactly one question at a time.
         - Focus on purpose, constraints, and success criteria.
      3. **Propose 2–3 approaches**
         - Include trade-offs.
         - Recommend one option with reasoning.
      4. **Prepare design.md**
         - Create the file with the required sections placeholders.
      5. **Write the design in sections**
         - Present one section at a time.
         - After each section, ask for approval before continuing.
         - If the user does not approve a section, revise that section and ask again.
         - If approved, fill up that section in the `design.md` before moving on.
         - Do not continue to the next section until the current one is approved.
      
      Do not skip steps. Do not reorder steps.
      
      ---
      
      # Design Process
      
      ## Understanding the idea:

      - Review the current project state first (files, docs, recent commits)
      - Assess scope before detailed questioning. If the request spans multiple loosely related subsystems, explicitly flag that it should be decomposed before proceeding.
      - Ask questions to clarify
        * Purpose
        * Constraints
        * Scope
      - Identify missing information that could materially affect architecture or implementation choices.
      
      ## Exploring approaches:

      - Propose 2-3 different approaches.
      - Present trade-offs clearly.
      - Lead with the recommended option and explain why.

      ## Presenting the design:

      - Present the design only after sufficient understanding is established.
      - Split the design into sections.
      - Scale each section to complexity:
        * Brief if straightforward.
        * More detailed if nuanced.
      - After each section, explicitly ask whether it looks correct before continuing.
      - Cover, where relevant:
        * Architecture
        * Components
        * Data flow
        * Error handling
        * Testing
      
      If the user indicates something is wrong or unclear, return to clarification before continuing.
      
      ---
      
      # Required Sections for design.md
      
      - **Context**: Briefly describe the problem, background, current state, constraints

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Proposed Solution**:
        * High-Level Architecture: Diagrams showing how major components interact(flow charts, sequence diagrams).
        * Detailed Design: Explain the architecture in detail, including data flow and component responsibilities. When relevant, include:
          - Key data structures and algorithms
          - database models
          - APIs / interfaces specifications
      
      - **Alternatives Considered**:
        * List 2-3 alternative approaches.
        * Explain why the proposed solution was chosen
      
      - **Cross-Cutting Concerns**:
        * Security
        * Scalability
        * Observability (logging/metrics/traces)
        * Performance

      - **Risks / Trade-offs**: Document known limitations and risks using this format:
        Format: [Risk] → Mitigation

      - **Operational Readiness**: Describe:
        * Deployment or migration plan
        * Rollback strategy
        * Operational concerns

      - **Open Questions**: List outstanding decisions, uncertainties or unresolved dependencies.

      Reference the proposal for motivation and specs for requirements.

    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      
      # Overview
      
      Create a comprehensive task list for implementation based on design.md.
      
      # Mindset
      
      Assume the readers(AI agents) have zero context for our codebase and 
      have questionable taste. Document everything they need to know: which 
      files to touch for each task, code, testing, docs they might need to 
      check, how to test it. Give them the whole plan as **bite-sized 
      tasks**. SOLID, DRY. YAGNI. TDD.

      Assume they are skilled developers, but know almost nothing about our toolset or problem domain.
      
      Assume they don't know good test design very well.
      
      
      # File Structure

      Before defining tasks, map out which files will be created or modified and what each one is responsible for. This is where decomposition decisions get locked in.

      - Each file should have one clear responsibility.
      - You reason best about code you can hold in context at once, and your edits are more reliable when files are focused. Prefer smaller, focused files over large ones that do too much.
      - Files that change together should live together. Split by responsibility, not by technical layer.
      - **In existing codebases, follow established patterns**. If a file you're modifying has grown unwieldy, including a split in the plan is reasonable.

      This structure informs the task decomposition. 
      
      
      # Bite-Sized Task Granularity
      
      Each task should produce self-contained changes that make sense independently.

      - You should break down a task into at least one sub-tasks. 
      - Sub-tasks can not have sub-tasks.
      - If a task has more than 5 sub-tasks, it's probably too big. Each task should be something you can hold in your head.
      
      
      # Strictly Follow the following Task List Template
      
      **IMPORTANT: Task List MUST follow the template below.**
      - **Tasks not using `- [ ]` won't be tracked** during apply phase.
      - **Add key context to tasks when helpful.** Use sub-bullets to include pseudo-code, exact commands, expected outcomes, or file references. This explicitly guides execution.
      
      Task List Template:
      
      ```markdown
      # Mindset

      - Your task is to implement a list of tasks in this document in order.
      - You implementation should be guided by the design documents.
      - You strive to write clean, maintainable code.
      
      # Principal

      - Think deeply and critically to discover edge cases and hidden complexities.
      - Prioritize:
        * Simplicity
        * Testability
        * Explicitness
      - Apply:
        * **YAGNI**
        * **DRY**.
        * **SOLID**
          - Single Responsibility Principle — each module should have one clear reason to change.
          - Open/Closed Principle — prefer extension points over modifying stable core behavior.
          - Liskov Substitution Principle — abstractions should be safely replaceable by implementations.
          - Interface Segregation Principle — prefer small, focused interfaces over broad ones.
          - Dependency Inversion — depend on abstractions at boundaries, not concrete implementations.

      # Task List
      
      ## 1. Add new module for export data
      
      - [ ] 1.1: Write the failing test

        * Test for happy and unhappy paths.
        * Use mocks.
      
      - [ ] 1.2: Write implementation**
      
        * Pseudo code of the key algorithm.
          ```
          def key_algorithm():
                # Step 1: Do this
                # Step 2: Do that
                # Step 3: Return result
          ```
      
      - [ ] 1.3: Run test to verify it passes**

        * Run: `pytest tests/path/test.py::test_name -v`
        * Expected: PASS
      
      ```
      
      Each task should be verifiable. That's how we know when it's done.
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
